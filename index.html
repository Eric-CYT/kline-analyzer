<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>▣ 加密貨幣 K線分析系統</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080d14;--card:#0c1420;--bd:#162233;--dim:#3d5470;--mid:#5a7394;
  --text:#dde8f5;--g:#22c55e;--r:#ef4444;--bl:#60a5fa;--am:#f59e0b;--pu:#a78bfa;--or:#f97316}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:14px;
  display:flex;flex-direction:column;height:100vh;overflow:hidden}
button{cursor:pointer;font-family:'Courier New',monospace;font-size:12px;border-radius:3px;padding:2px 8px;transition:all .15s}
#hdr{background:var(--card);border-bottom:1px solid var(--bd);padding:6px 12px;
  display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex-shrink:0}
.logo{color:var(--bl);font-weight:bold;font-size:15px;white-space:nowrap}
.bgrp{display:flex;gap:3px;flex-wrap:wrap}
#srch-wrap{position:relative;display:flex;align-items:center}
#srch{background:#0a1628;border:1px solid var(--bd);border-radius:3px 0 0 3px;color:var(--text);
  font-family:'Courier New',monospace;font-size:13px;padding:4px 9px;width:165px;outline:none;transition:border-color .15s}
#srch:focus{border-color:var(--bl)}
#srch-go{background:#0a1628;border:1px solid var(--bd);border-left:none;border-radius:0 3px 3px 0;color:var(--mid);padding:4px 8px;font-size:12px}
#srch-go:hover{color:var(--bl)}
#srch-clear{position:absolute;right:36px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);font-size:12px;padding:0 4px;display:none}
#dd{display:none;position:absolute;top:calc(100% + 4px);left:0;background:#0d1b2e;border:1px solid var(--bd);
  border-radius:5px;min-width:200px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.6);overflow:hidden}
.ddi{display:flex;align-items:center;gap:6px;padding:7px 11px;cursor:pointer;font-size:13px;border-bottom:1px solid #0d1b2e;transition:background .1s}
.ddi:hover{background:#182d45}.ddi:last-child{border-bottom:none}
#refresh{border:1px solid var(--bd);background:transparent;color:var(--text)}
#refresh:hover{border-color:var(--bl);color:var(--bl)}
#stats-bar{width:100%;display:flex;gap:12px;font-size:12px;padding:2px 0 0;
  border-top:1px solid var(--bd);margin-top:3px;flex-wrap:wrap;align-items:center}
#err{display:none;background:#2d0a0a;border:1px solid var(--r);border-radius:6px;
  margin:5px 8px;padding:7px 12px;justify-content:space-between;align-items:center;flex-shrink:0;gap:10px}
#loading{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.spin{font-size:28px;animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
/* ── Sidebar ── */
#sidebar{width:190px;background:#090e1a;border-right:1px solid var(--bd);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
#sb-hdr{display:flex;align-items:stretch;border-bottom:1px solid var(--bd);flex-shrink:0}
#sb-tabs{display:flex;flex:1}
.sb-tab{flex:1;padding:7px 2px;border:none;background:transparent;color:var(--mid);font-size:11px;
  cursor:pointer;border-bottom:2px solid transparent;font-family:'Courier New',monospace;transition:all .15s}
.sb-tab.on{color:var(--bl);border-bottom-color:var(--bl);background:rgba(96,165,250,0.06)}
#sb-rf{padding:6px 8px;border:none;background:transparent;color:var(--dim);
  cursor:pointer;font-size:14px;border-left:1px solid var(--bd)}
#sb-rf:hover{color:var(--bl)}
#sb-filter{background:transparent;border:none;border-bottom:1px solid var(--bd);
  color:var(--text);font-size:12px;padding:6px 9px;width:100%;outline:none;
  font-family:'Courier New',monospace;flex-shrink:0;letter-spacing:.02em}
#coin-list{flex:1;overflow-y:auto}
.ci{display:flex;align-items:center;padding:5px 6px;cursor:pointer;
  border-bottom:1px solid #0d1825;gap:3px;transition:background .1s;user-select:none}
.ci:hover{background:#111e30}
.ci.active{background:#142845;border-left:2px solid var(--bl);padding-left:4px}
.ci-rank{font-size:10px;color:var(--dim);min-width:16px;text-align:right;flex-shrink:0}
.ci-mid{flex:1;min-width:0;overflow:hidden}
.ci-sym{font-size:12px;font-weight:bold;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-price{font-size:10px;color:var(--dim);display:block}
.ci-chg{font-size:10px;flex-shrink:0;min-width:38px;text-align:right}
.ci-star{font-size:14px;color:var(--dim);flex-shrink:0;padding:0 2px;transition:color .15s;line-height:1}
.ci-star:hover,.ci-star.on{color:var(--am)}
/* ── Main area ── */
#main{display:flex;flex:1;overflow:hidden}
#charts{flex:1;overflow-y:auto;padding:7px 5px 7px 7px}
#panel{width:300px;background:var(--card);border-left:1px solid var(--bd);padding:10px;overflow-y:auto;flex-shrink:0}
.cbox{background:var(--card);border-radius:7px;margin-bottom:5px;padding:4px 6px}
.clbl{font-size:11px;color:var(--dim);margin-bottom:2px;display:flex;gap:10px;align-items:center}
.tab-btn{padding:4px 14px;border-radius:4px;border:none;background:var(--bd);color:var(--mid);font-size:12px}
.tab-btn.on{background:#1e40af;color:#fff}
.prow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bd)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>
<body>

<div id="hdr">
  <span class="logo">▣ K線分析</span>
  <div id="ex-btns" class="bgrp"></div>
  <div id="srch-wrap">
    <input id="srch" type="text" placeholder="🔍 USDT對搜尋 (PEPE...)"
           autocomplete="off" spellcheck="false" maxlength="15"
           oninput="onSrch(this.value)" onkeydown="onSrchKey(event)" onfocus="onSrchFocus()">
    <button id="srch-clear" onclick="clearSrch()">✕</button>
    <button id="srch-go" onclick="doSearch()">GO</button>
    <div id="dd"></div>
  </div>
  <div id="coin-btns" class="bgrp"></div>
  <div id="tf-btns" class="bgrp"></div>
  <button id="refresh" onclick="fetchData()">⟳ 刷新</button>
  <div id="stats-bar"></div>
</div>

<div id="err"></div>
<div id="loading">
  <div class="spin">⟳</div>
  <div id="load-msg" style="color:var(--mid)"></div>
</div>

<div id="main">
  <!-- Left Sidebar: Top 100 + Favorites -->
  <div id="sidebar">
    <div id="sb-hdr">
      <div id="sb-tabs">
        <button id="sb-all" class="sb-tab on" onclick="setSideTab('all')">全部 Top100</button>
        <button id="sb-fav" class="sb-tab" onclick="setSideTab('fav')">★ 最愛</button>
      </div>
      <button id="sb-rf" onclick="fetchTop100()" title="刷新排名">⟳</button>
    </div>
    <input id="sb-filter" placeholder="🔍 篩選幣種..." oninput="renderSidebar()">
    <div id="coin-list">
      <div style="text-align:center;padding:24px 10px;color:#2d4156">
        <div style="font-size:22px;margin-bottom:8px">⟳</div>
        <div style="font-size:10px">載入 Top 100…</div>
      </div>
    </div>
  </div>
  <div id="charts"><div id="chart-content"></div></div>
  <div id="panel"><div id="panel-content"></div></div>
</div>

<script>
/* ══ CONFIG ═════════════════════════════════════════════ */
const QUICK=['BTC','ETH','SOL','BNB','XRP','DOGE','ADA','AVAX','DOT','LINK','LTC','MATIC'];
const ALL_PAIRS=['BTC','ETH','SOL','BNB','XRP','DOGE','ADA','AVAX','DOT','LINK','LTC','MATIC',
  'UNI','AAVE','COMP','MKR','CRV','SNX','GMX','DYDX','ARB','OP','INJ','SUI','APT','SEI','TIA',
  'NEAR','FIL','ATOM','ICP','EGLD','PEPE','WIF','BONK','FLOKI','SHIB','BOME','GRT','FET','OCEAN',
  'RNDR','WLD','SAND','MANA','ENJ','IMX','JUP','PYTH','PENDLE','HBAR','VET','XLM','TRX','ORDI'];
const TFS=['1D','4H','1H','15M'];
const STABLES=new Set(['USDT','USDC','BUSD','DAI','TUSD','USDP','USDD','FRAX','GUSD','LUSD','PYUSD','EURT','FDUSD']);

const EX={
  binance:{label:'Binance',color:'#F0B90B',sym:c=>c+'USDT',
    async get(sym,tf,n){
      const iv={'1D':'1d','4H':'4h','1H':'1h','15M':'15m'}[tf];
      const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${iv}&limit=${n}`);
      if(!r.ok)throw new Error(`Binance HTTP ${r.status}`);
      const d=await r.json();if(!Array.isArray(d))throw new Error('Binance異常回應');
      return d.map((k,i)=>({i,date:fd(+k[0]),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}));
    }},
  bybit:{label:'Bybit',color:'#F7A600',sym:c=>c+'USDT',
    async get(sym,tf,n){
      const iv={'1D':'D','4H':'240','1H':'60','15M':'15'}[tf];
      const r=await fetch(`https://api.bybit.com/v5/market/kline?category=linear&symbol=${sym}&interval=${iv}&limit=${n}`);
      if(!r.ok)throw new Error(`Bybit HTTP ${r.status}`);
      const d=await r.json();if(d.retCode!==0)throw new Error(`Bybit: ${d.retMsg}`);
      return d.result.list.slice().reverse().map((k,i)=>({i,date:fd(+k[0]),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}));
    }},
  okx:{label:'OKX',color:'#00C2FF',sym:c=>c+'-USDT',
    async get(sym,tf,n){
      const iv={'1D':'1D','4H':'4H','1H':'1H','15M':'15m'}[tf];
      const r=await fetch(`https://www.okx.com/api/v5/market/candles?instId=${sym}&bar=${iv}&limit=${n}`);
      if(!r.ok)throw new Error(`OKX HTTP ${r.status}`);
      const d=await r.json();if(d.code!=='0')throw new Error(`OKX: ${d.msg}`);
      return d.data.slice().reverse().map((k,i)=>({i,date:fd(+k[0]),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}));
    }}
};

/* ══ STATE ══════════════════════════════════════════════ */
const S={ex:'binance',coin:'BTC',tf:'1D',range:'recent',data:[],loading:false,error:null,tab:'chart',updated:null,
  cl:[],vl:[],macd:{line:[],sig:[],hist:[]},rsi:[],ma200:[],ma50:[],bb:{up:[],mid:[],lo:[]},poc:null,sigs:[],btR:[]};
let sideTab='all';
let top100=[];
let sbLoading=true;
let favs=JSON.parse(localStorage.getItem('kl_favs')||'[]');
let recent=JSON.parse(sessionStorage.getItem('kl_rec')||'[]');
function addRecent(c){recent=[c,...recent.filter(x=>x!==c)].slice(0,6);sessionStorage.setItem('kl_rec',JSON.stringify(recent));}

/* ══ FALLBACK TOP50 ═════════════════════════════════════ */
const FALLBACK=[[1,'BTC','Bitcoin'],[2,'ETH','Ethereum'],[3,'BNB','BNB'],[4,'SOL','Solana'],
  [5,'XRP','XRP'],[6,'DOGE','Dogecoin'],[7,'ADA','Cardano'],[8,'AVAX','Avalanche'],
  [9,'SHIB','Shiba Inu'],[10,'DOT','Polkadot'],[11,'LINK','Chainlink'],[12,'MATIC','Polygon'],
  [13,'LTC','Litecoin'],[14,'UNI','Uniswap'],[15,'ATOM','Cosmos'],[16,'XLM','Stellar'],
  [17,'ETC','Ethereum Classic'],[18,'APT','Aptos'],[19,'OP','Optimism'],[20,'ARB','Arbitrum'],
  [21,'NEAR','NEAR Protocol'],[22,'FIL','Filecoin'],[23,'SUI','Sui'],[24,'INJ','Injective'],
  [25,'TIA','Celestia'],[26,'PEPE','Pepe'],[27,'BONK','Bonk'],[28,'WIF','dogwifhat'],
  [29,'FLOKI','FLOKI'],[30,'ORDI','ORDI'],[31,'AAVE','Aave'],[32,'GRT','The Graph'],
  [33,'SAND','The Sandbox'],[34,'MANA','Decentraland'],[35,'CRV','Curve DAO'],
  [36,'MKR','Maker'],[37,'SNX','Synthetix'],[38,'COMP','Compound'],[39,'GMX','GMX'],
  [40,'DYDX','dYdX'],[41,'IMX','ImmutableX'],[42,'RNDR','Render'],[43,'FET','Fetch.ai'],
  [44,'WLD','Worldcoin'],[45,'JUP','Jupiter'],[46,'PYTH','Pyth Network'],
  [47,'PENDLE','Pendle'],[48,'SEI','Sei'],[49,'HBAR','Hedera'],[50,'VET','VeChain'],
  [51,'RUNE','THORChain'],[52,'THETA','Theta'],[53,'CHZ','Chiliz'],[54,'GALA','Gala'],
  [55,'AXS','Axie Infinity'],[56,'ENJ','Enjin'],[57,'ROSE','Oasis'],[58,'ZIL','Zilliqa'],
  [59,'FTM','Fantom'],[60,'ONE','Harmony'],[61,'KAVA','Kava'],[62,'CELO','Celo'],
  [63,'STORJ','Storj'],[64,'OCEAN','Ocean Protocol'],[65,'BAT','Basic Attention'],
  [66,'ZRX','0x Protocol'],[67,'LRC','Loopring'],[68,'SKL','SKALE'],
  [69,'MASK','Mask Network'],[70,'DUSK','Dusk Network'],
].map(([rank,symbol,name])=>({rank,symbol,name,price:0,change24h:0}));

/* ══ SEARCH ═════════════════════════════════════════════ */
let ddIdx=-1;
function onSrch(val){
  document.getElementById('srch-clear').style.display=val?'block':'none';
  val=val.trim().toUpperCase();
  if(!val){showDd([...new Set([...recent,...POPULAR])].slice(0,8),'');return;}
  const m=ALL_PAIRS.filter(c=>c.startsWith(val)||c.includes(val)).slice(0,7);
  if(!m.includes(val)&&val.length>=2)m.push(val);
  showDd(m.slice(0,8),val);
}
const POPULAR=['BTC','ETH','SOL','XRP','DOGE','PEPE','WIF','ARB','RNDR','INJ'];
function showDd(items,q){
  const dd=document.getElementById('dd');ddIdx=-1;
  if(!items.length){dd.style.display='none';return;}
  dd.innerHTML=items.map((c,i)=>{
    const isRec=recent.includes(c),isNew=!ALL_PAIRS.includes(c);
    const hi=q&&c.startsWith(q)?`<b style="color:var(--bl)">${c.slice(0,q.length)}</b>${c.slice(q.length)}`:c;
    return`<div class="ddi" id="ddi${i}" onclick="pickCoin('${c}')">
      <span style="font-size:9px;width:14px">${isRec?'🕐':isNew?'✦':''}</span>
      <span>${hi}</span><span style="color:var(--mid);font-size:10px">/USDT</span>
      ${isNew?'<span style="color:var(--am);font-size:9px;margin-left:auto">自定義</span>':''}
    </div>`;
  }).join('');
  dd.style.display='block';
}
function hideDd(){document.getElementById('dd').style.display='none';ddIdx=-1;}
function onSrchFocus(){
  const v=document.getElementById('srch').value.trim().toUpperCase();
  const items=v?ALL_PAIRS.filter(c=>c.startsWith(v)||c.includes(v)).slice(0,8)
              :[...new Set([...recent,...POPULAR])].slice(0,8);
  showDd(items,v);
}
function onSrchKey(e){
  const items=document.querySelectorAll('.ddi');
  if(e.key==='ArrowDown'){e.preventDefault();ddIdx=Math.min(ddIdx+1,items.length-1);items.forEach((el,i)=>el.style.background=i===ddIdx?'#182d45':'');return;}
  if(e.key==='ArrowUp'){e.preventDefault();ddIdx=Math.max(ddIdx-1,-1);items.forEach((el,i)=>el.style.background=i===ddIdx?'#182d45':'');return;}
  if(e.key==='Escape'){hideDd();return;}
  if(e.key==='Enter'){e.preventDefault();if(ddIdx>=0&&items[ddIdx]){items[ddIdx].click();return;}doSearch();}
}
function pickCoin(c){
  if(QUICK.includes(c)){document.getElementById('srch').value='';document.getElementById('srch-clear').style.display='none';}
  else{document.getElementById('srch').value=c;document.getElementById('srch-clear').style.display='block';}
  hideDd();S.coin=c;addRecent(c);fetchData();
}
function doSearch(){
  let v=document.getElementById('srch').value.trim().toUpperCase();
  if(!v)return;
  // Normalize: strip USDT/-USDT suffix, reject other quote pairs
  v=v.replace(/[-\/]?USDT$/,'');
  if(/(BTC|ETH|BNB|BUSD|USDC|EUR|TRY|DAI)$/.test(v)&&v.length>4){
    S.error='僅支援 USDT 交易對，請只輸入幣種代號（如 PEPE）';renderErr();return;}
  if(!/^[A-Z0-9]{1,12}$/.test(v)){
    S.error='代號格式錯誤，僅接受英數字（如 BTC、PEPE、1000SATS）';renderErr();return;}
  hideDd();S.coin=v;addRecent(v);fetchData();
}
function clearSrch(){
  document.getElementById('srch').value='';document.getElementById('srch-clear').style.display='none';
  hideDd();document.getElementById('srch').focus();
}
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==document.getElementById('srch')){
    e.preventDefault();document.getElementById('srch').focus();onSrchFocus();}
});
document.addEventListener('click',e=>{if(!document.getElementById('srch-wrap').contains(e.target))hideDd();});

/* ══ UTILS ══════════════════════════════════════════════ */
const fd=ts=>{const d=new Date(ts);return`${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;};
const fp=v=>{if(v==null)return'-';const a=Math.abs(v);
  if(a>=100000)return(v/1000).toFixed(0)+'K';if(a>=10000)return v.toFixed(0);
  if(a>=100)return v.toFixed(2);return v.toFixed(4);};
const fpS=v=>{if(!v)return'-';const a=Math.abs(v);
  if(a>=10000)return(v/1000).toFixed(0)+'K';if(a>=100)return v.toFixed(0);
  if(a>=1)return v.toFixed(2);if(a>=0.0001)return v.toFixed(4);return v.toExponential(2);};

/* ══ MATH ════════════════════════════════════════════════ */
const _ema=(arr,p)=>{const k=2/(p+1);const res=[];let e=null;
  for(let i=0;i<arr.length;i++){if(arr[i]==null){res.push(null);continue;}
    if(e===null){if(i<p-1){res.push(null);continue;}e=arr.slice(i-p+1,i+1).reduce((a,b)=>a+b)/p;}
    else e=arr[i]*k+e*(1-k);res.push(+e.toFixed(8));}return res;};
const _sma=(arr,p)=>arr.map((_,i)=>i<p-1?null:+(arr.slice(i-p+1,i+1).reduce((a,b)=>a+b)/p).toFixed(6));
const _macd=cl=>{const l12=_ema(cl,12),l26=_ema(cl,26);
  const line=l12.map((v,i)=>v!=null&&l26[i]!=null?+(v-l26[i]).toFixed(8):null);
  const sig=_ema(line.map(v=>v??0),9);
  return{line,sig,hist:line.map((v,i)=>v!=null&&sig[i]!=null?+(v-sig[i]).toFixed(8):null)};};
const _rsi=(cl,p=14)=>cl.map((_,i)=>{if(i<p)return null;let g=0,l=0;
  for(let j=i-p+1;j<=i;j++){const d=cl[j]-cl[j-1];d>0?g+=d:l-=d;}
  const ag=g/p,al=l/p;return al===0?100:+(100-100/(1+ag/al)).toFixed(2);});
const _bb=(cl,p=20,m=2)=>{const mid=_sma(cl,p);const up=[],lo=[];
  cl.forEach((_,i)=>{if(i<p-1){up.push(null);lo.push(null);return;}
    const sl=cl.slice(i-p+1,i+1),mn=mid[i];
    const sd=Math.sqrt(sl.reduce((s,v)=>s+(v-mn)**2,0)/p);
    up.push(+(mn+m*sd).toFixed(6));lo.push(+(mn-m*sd).toFixed(6));});return{up,mid,lo};};
const _poc=(D,look=60)=>{const rc=D.slice(-look);
  const all=rc.flatMap(c=>[c.high,c.low]);const mn=Math.min(...all),mx=Math.max(...all);
  const step=(mx-mn)/50||0.01;const map={};
  rc.forEach(c=>{const lv=Math.max(1,Math.round((c.high-c.low)/step));
    for(let l=0;l<=lv;l++){const p=+(c.low+l*step).toFixed(6);map[p]=(map[p]||0)+c.volume/(lv+1);}});
  let mv=0,poc=mn;Object.entries(map).forEach(([p,v])=>{if(v>mv){mv=v;poc=+p;}});return poc;};

/* ══ SIGNALS ════════════════════════════════════════════ */
function detectSignals(){
  const{data:D,rsi:rsiA,macd:macdO,ma200:ma200A,bb:bbO,vl:volA}=S;const out=[];
  for(let i=15;i<D.length-3;i++){
    const c=D[i],p=D[i-1],body=Math.abs(c.close-c.open),bull=c.close>=c.open;
    const lw=Math.min(c.open,c.close)-c.low,uw=c.high-Math.max(c.open,c.close);
    const av=volA.slice(Math.max(0,i-10),i).reduce((a,b)=>a+b,0)/10||1;
    const vs=c.volume>av*1.4,a200=ma200A[i]!=null&&c.close>ma200A[i];
    const n200=ma200A[i]!=null&&Math.abs(c.low-ma200A[i])/ma200A[i]<0.015;
    const r=rsiA[i],r1=rsiA[i-1];const{line:ml,sig:ms,hist:mh}=macdO;let hit=null;
    if(bull&&lw>2.5*body&&uw<0.4*body){
      let s=2;const co=['下影線>=2.5倍實體','看漲收盤'];
      if(r!=null&&r<35){co.push('RSI超賣('+r.toFixed(0)+')');s+=2;}
      if(bbO.lo[i]!=null&&c.low<=bbO.lo[i]){co.push('觸及布林下軌');s++;}
      if(a200||n200){co.push('MA200支撐位');s++;}if(vs){co.push('成交量放大x1.4');s++;}

      if(s>=4)hit={n:'🔄 RSI超賣反彈',co,s,ms:7,tp:0.05,sl:0.025};}
    if(!hit){const c0=D[i],c1=D[i-1],c2=D[i-2];
      if(c0.close>c0.open&&c1.close>c1.open&&c2.close>c2.open&&
         c0.close>c1.close&&c1.close>c2.close&&Math.abs(c0.open-c1.close)/c1.close<0.006){

    if(hit){const ep=c.close;
      out.push({index:i,date:c.date,close:ep,pattern:hit.n,conds:hit.co,str:hit.s,maxStr:hit.ms,

function doBacktest(){
  S.btR=S.sigs.map(s=>{const D=S.data;
    for(let i=s.index+1;i<D.length&&i<=s.index+30;i++){const c=D[i];
      if(c.high>=s.tp)return{...s,result:'WIN',exit:s.tp,bars:i-s.index,pnl:+((s.tp-s.entry)/s.entry*100).toFixed(2)};
      if(c.low<=s.sl)return{...s,result:'LOSS',exit:s.sl,bars:i-s.index,pnl:+((s.sl-s.entry)/s.entry*100).toFixed(2)};}
    const e=D[Math.min(s.index+30,D.length-1)].close,pnl=+((e-s.entry)/s.entry*100).toFixed(2);
    return{...s,result:pnl>=0?'WIN':'LOSS',exit:e,bars:30,pnl};});}
function compute(){
  const D=S.data;S.cl=D.map(d=>d.close);S.vl=D.map(d=>d.volume);
  S.macd=S.cl.length?_macd(S.cl):{line:[],sig:[],hist:[]};
  S.rsi=S.cl.length?_rsi(S.cl):[];
  S.ma200=S.cl.length>=200?_sma(S.cl,200):S.cl.map(()=>null);
  S.ma50=S.cl.length>=50?_sma(S.cl,50):S.cl.map(()=>null);
  S.bb=S.cl.length>=20?_bb(S.cl):{up:[],mid:[],lo:[]};
  S.poc=D.length>=20?_poc(D):null;
  detectSignals();doBacktest();
}

/* ══ SVG ════════════════════════════════════════════════ */
const lp=(arr,tx,ty)=>{let d='';arr.forEach((v,i)=>{if(v!=null)d+=(d?'L':'M')+tx(i).toFixed(1)+','+ty(v).toFixed(1);});return d;};
const fmtP=v=>{const a=Math.abs(v);
  if(a>=100000)return(v/1000).toFixed(0)+'K';if(a>=10000)return(v/1000).toFixed(1)+'K';
  if(a>=100)return v.toFixed(0);return v.toFixed(4);};

function svgCandle(C,ma200,ma50,bb,poc,sigs,w,h){
  const P={t:12,r:76,b:18,l:6};const cw=w-P.l-P.r,ch=h-P.t-P.b,n=C.length;
  if(!n)return'<svg width="'+w+'" height="'+h+'"></svg>';
  const bw=Math.max(2,cw/n-0.8);
  let mn=Infinity,mx=-Infinity;
  C.forEach(c=>{mn=Math.min(mn,c.low);mx=Math.max(mx,c.high);});
  [...bb.up,...bb.lo,...ma200,...ma50].forEach(v=>{if(v!=null){mn=Math.min(mn,v);mx=Math.max(mx,v);}});
  const pad=(mx-mn)*0.04;mn-=pad;mx+=pad;const R=mx-mn||1;
  const tx=i=>P.l+(i+0.5)*(cw/n),ty=p=>P.t+ch-((p-mn)/R)*ch;
  let s='<svg width="'+w+'" height="'+h+'" style="display:block;max-width:100%">';
  s+='<rect x="'+P.l+'" y="'+P.t+'" width="'+cw+'" height="'+ch+'" fill="#000000" rx="3"/>';
  [0,.25,.5,.75,1].forEach(f=>{const p=mn+f*R,y=ty(p).toFixed(1);
    s+='<line x1="'+P.l+'" x2="'+(P.l+cw)+'" y1="'+y+'" y2="'+y+'" stroke="#12213a" stroke-width="1" stroke-dasharray="4 3"/>';
    s+='<text x="'+(P.l+cw+4)+'" y="'+(ty(p)+4).toFixed(1)+'" fill="#3a5070" font-size="9" font-family="monospace">'+fmtP(p)+'</text>';});
  if(poc!=null){const py=ty(poc).toFixed(1);
    s+='<line x1="'+P.l+'" x2="'+(P.l+cw)+'" y1="'+py+'" y2="'+py+'" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="6 3" opacity=".85"/>';
    s+='<text x="'+(P.l+cw+4)+'" y="'+(ty(poc)-2).toFixed(1)+'" fill="#9333ea" font-size="8" font-family="monospace">POC</text>';
    s+='<text x="'+(P.l+cw+4)+'" y="'+(ty(poc)+9).toFixed(1)+'" fill="#7c3aed" font-size="8" font-family="monospace">'+fmtP(poc)+'</text>';}
  const upPts=bb.up.map((v,i)=>v!=null?tx(i).toFixed(1)+','+ty(v).toFixed(1):null).filter(Boolean);
  const loPts=bb.lo.map((v,i)=>v!=null?tx(i).toFixed(1)+','+ty(v).toFixed(1):null).filter(Boolean);
  if(upPts.length&&loPts.length)s+='<path d="M'+upPts.join('L')+'L'+loPts.slice().reverse().join('L')+'Z" fill="rgba(59,130,246,0.055)"/>';
  const bbU=lp(bb.up,tx,ty),bbL=lp(bb.lo,tx,ty),bbM=lp(bb.mid,tx,ty);
  if(bbU)s+='<path d="'+bbU+'" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3 2" opacity=".65"/>';
  if(bbL)s+='<path d="'+bbL+'" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3 2" opacity=".65"/>';
  if(bbM)s+='<path d="'+bbM+'" fill="none" stroke="#6366f1" stroke-width="1" opacity=".45"/>';
  const m5=lp(ma50,tx,ty);if(m5)s+='<path d="'+m5+'" fill="none" stroke="#38bdf8" stroke-width="1.2" opacity=".75" stroke-dasharray="5 2"/>';
  const m2=lp(ma200,tx,ty);if(m2)s+='<path d="'+m2+'" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity=".9"/>';
  C.forEach((c,i)=>{const x=tx(i),col=c.close>=c.open?'#22c55e':'#ef4444';
    const bt=ty(Math.max(c.open,c.close)),bb2=ty(Math.min(c.open,c.close));
    s+='<line x1="'+x.toFixed(1)+'" x2="'+x.toFixed(1)+'" y1="'+ty(c.high).toFixed(1)+'" y2="'+ty(c.low).toFixed(1)+'" stroke="'+col+'" stroke-width="1"/>';
    s+='<rect x="'+(x-bw/2).toFixed(1)+'" y="'+bt.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(1,bb2-bt).toFixed(1)+'" fill="'+col+'" opacity=".9"/>';});
  sigs.forEach(sig=>{const li=sig.index-(C[0]?.i||0);if(li<0||li>=n)return;
    const x=tx(li),y=ty(C[li]?.low??sig.close)+13;
    s+='<polygon points="'+x.toFixed(1)+','+y.toFixed(1)+' '+(x-5).toFixed(1)+','+(y+9).toFixed(1)+' '+(x+5).toFixed(1)+','+(y+9).toFixed(1)+'" fill="#f59e0b" opacity=".95"/>';
    s+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="2" fill="#fde68a"/>';});
  const ev=Math.max(1,Math.floor(n/(n>400?12:8)));
  C.forEach((c,i)=>{if(i%ev!==0)return;
    s+='<text x="'+tx(i).toFixed(1)+'" y="'+(P.t+ch+13).toFixed(1)+'" text-anchor="middle" fill="#253a52" font-size="9" font-family="monospace">'+c.date+'</text>';});
  return s+'</svg>';}

function svgVol(sub,w,h){
  const P={t:4,r:76,b:2,l:6};const cw=w-P.l-P.r,ch=h-P.t-P.b,n=sub.length;
  if(!n)return'<svg width="'+w+'" height="'+h+'"></svg>';
  const bw=Math.max(2,cw/n-0.8),maxV=Math.max(...sub.map(d=>d.vol));
  const tx=i=>P.l+(i+0.5)*(cw/n);
  let s='<svg width="'+w+'" height="'+h+'" style="display:block;max-width:100%">';
  s+='<rect x="'+P.l+'" y="'+P.t+'" width="'+cw+'" height="'+ch+'" fill="#000000" rx="3"/>';
  sub.forEach((d,i)=>{const x=tx(i),bh=Math.max(1,(d.vol/maxV)*ch);
    s+='<rect x="'+(x-bw/2).toFixed(1)+'" y="'+(P.t+ch-bh).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh.toFixed(1)+'" fill="'+(d.bull?'#22c55e':'#ef4444')+'" opacity=".45" rx="1"/>';});
  return s+'</svg>';}

function svgMACD(sub,w,h){
  const P={t:4,r:76,b:4,l:38};const cw=w-P.l-P.r,ch=h-P.t-P.b,n=sub.length;
  if(!n)return'<svg width="'+w+'" height="'+h+'"></svg>';
  const bw=Math.max(2,cw/n-0.8);
  const vals=[...sub.map(d=>d.hist),...sub.map(d=>d.macd),...sub.map(d=>d.sig)].filter(v=>v!=null&&isFinite(v));
  if(!vals.length)return'<svg width="'+w+'" height="'+h+'"><rect width="'+w+'" height="'+h+'" fill="#000000" rx="3"/></svg>';
  let mn=Math.min(...vals),mx=Math.max(...vals);const pad=(mx-mn)*0.12||0.001;mn-=pad;mx+=pad;
  const R=mx-mn||1,tx=i=>P.l+(i+0.5)*(cw/n),ty=v=>P.t+ch-((v-mn)/R)*ch,zY=ty(0);
  const fY=v=>{const a=Math.abs(v);if(a>=1000)return(v/1000).toFixed(1)+'K';if(a>=1)return v.toFixed(1);if(a>=0.01)return v.toFixed(3);return v.toFixed(6);};
  let s='<svg width="'+w+'" height="'+h+'" style="display:block;max-width:100%">';
  s+='<rect x="'+P.l+'" y="'+P.t+'" width="'+cw+'" height="'+ch+'" fill="#000000" rx="3"/>';
  [mn,0,mx].forEach(v=>{const y=ty(v).toFixed(1);
    s+='<line x1="'+P.l+'" x2="'+(P.l+cw)+'" y1="'+y+'" y2="'+y+'" stroke="'+(v===0?'#2d4156':'#12213a')+'" stroke-width="'+(v===0?1.5:1)+'" '+(v!==0?'stroke-dasharray="3 3"':'')+'/>';
    s+='<text x="'+(P.l-3)+'" y="'+(ty(v)+3).toFixed(1)+'" text-anchor="end" fill="#3a5070" font-size="8" font-family="monospace">'+fY(v)+'</text>';});
  sub.forEach((d,i)=>{if(d.hist==null||!isFinite(d.hist))return;
    const x=tx(i),hY=ty(d.hist),top=Math.min(hY,zY),ht=Math.max(1,Math.abs(hY-zY));
    s+='<rect x="'+(x-bw/2).toFixed(1)+'" y="'+top.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+ht.toFixed(1)+'" fill="'+(d.hist>=0?'#22c55e':'#ef4444')+'" opacity=".7" rx="1"/>';});
  const mp=lp(sub.map(d=>d.macd),tx,ty);if(mp)s+='<path d="'+mp+'" fill="none" stroke="#60a5fa" stroke-width="1.5"/>';
  const sp=lp(sub.map(d=>d.sig),tx,ty);if(sp)s+='<path d="'+sp+'" fill="none" stroke="#f97316" stroke-width="1"/>';
  return s+'</svg>';}

function svgRSI(sub,w,h){
  const P={t:4,r:76,b:4,l:28};const cw=w-P.l-P.r,ch=h-P.t-P.b,n=sub.length;
  if(!n)return'<svg width="'+w+'" height="'+h+'"></svg>';
  const tx=i=>P.l+(i+0.5)*(cw/n),ty=v=>P.t+ch-((v/100)*ch);
  let s='<svg width="'+w+'" height="'+h+'" style="display:block;max-width:100%">';
  s+='<rect x="'+P.l+'" y="'+P.t+'" width="'+cw+'" height="'+ch+'" fill="#000000" rx="3"/>';
  s+='<rect x="'+P.l+'" y="'+ty(70).toFixed(1)+'" width="'+cw+'" height="'+(ty(100)-ty(70)).toFixed(1)+'" fill="rgba(239,68,68,0.07)"/>';
  s+='<rect x="'+P.l+'" y="'+ty(30).toFixed(1)+'" width="'+cw+'" height="'+(ty(0)-ty(30)).toFixed(1)+'" fill="rgba(34,197,94,0.07)"/>';
  [[70,'#ef4444'],[50,'#2d4156'],[30,'#22c55e']].forEach(([v,col])=>{const y=ty(v).toFixed(1);
    s+='<line x1="'+P.l+'" x2="'+(P.l+cw)+'" y1="'+y+'" y2="'+y+'" stroke="'+col+'" stroke-width="1" '+(v!==50?'stroke-dasharray="3 3"':'')+'/>';
    s+='<text x="'+(P.l+cw+4)+'" y="'+(ty(v)+4).toFixed(1)+'" fill="'+col+'" font-size="8" font-family="monospace">'+v+'</text>';});
  const rp=lp(sub.map(d=>d.rsi),tx,ty);if(rp)s+='<path d="'+rp+'" fill="none" stroke="#a78bfa" stroke-width="1.5"/>';
  return s+'</svg>';}

async function fetchTop100(){
  sbLoading=true;renderSidebar();
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false&price_change_percentage=24h');
    if(!r.ok)throw new Error('rate limit');
    const d=await r.json();
    top100=d.filter(c=>!STABLES.has(c.symbol.toUpperCase())).map((c,idx)=>({
      rank:c.market_cap_rank||idx+1,symbol:c.symbol.toUpperCase(),
      name:c.name,price:c.current_price||0,change24h:c.price_change_percentage_24h||0
    }));
  }catch(e){top100=FALLBACK;}
  sbLoading=false;renderSidebar();
}

function bStats(){
  const wins=S.btR.filter(r=>r.result==='WIN').length,tot=S.btR.length;
  const wr=tot?+(wins/tot*100).toFixed(1):0;
  const avgW=wins?+(S.btR.filter(r=>r.result==='WIN').reduce((a,r)=>a+r.pnl,0)/wins).toFixed(2):0;
  const avgL=(tot-wins)?+(S.btR.filter(r=>r.result==='LOSS').reduce((a,r)=>a+r.pnl,0)/(tot-wins)).toFixed(2):0;
  const byP={};S.btR.forEach(r=>{if(!byP[r.pattern])byP[r.pattern]={w:0,t:0};byP[r.pattern].t++;if(r.result==='WIN')byP[r.pattern].w++;});
  return{wins,tot,wr,avgW,avgL,byP};}

    '<button onclick="pickCoin(\''+c+'\')" style="border:1px solid '+(S.coin===c?'#1d4ed8':'#162233')+';background:'+(S.coin===c?'#1d4ed8':'transparent')+';color:'+(S.coin===c?'#fff':'#5a7394')+'">'+c+'</button>'
  ).join('');
  document.getElementById('tf-btns').innerHTML=TFS.map(t=>
    '<button onclick="setTF(\''+t+'\')" style="border:1px solid '+(S.tf===t?'#f59e0b':'#162233')+';background:'+(S.tf===t?'#f59e0b22':'transparent')+';color:'+(S.tf===t?'#f59e0b':'#5a7394')+'">'+t+'</button>'
  ).join('');
  if(!QUICK.includes(S.coin)){document.getElementById('srch').value=S.coin;document.getElementById('srch-clear').style.display='block';}
  const px=S.cl[S.cl.length-1]||0,r=S.rsi[S.rsi.length-1];
  const ml=S.macd.line[S.macd.line.length-1],ms=S.macd.sig[S.macd.sig.length-1];
  const m2=S.ma200[S.ma200.length-1],abv=m2!=null&&px>m2;

    '<span style="color:'+EX[S.ex].color+';font-weight:bold">'+EX[S.ex].sym(S.coin)+'</span>'
    +'<span onclick="toggleFav(\''+S.coin+'\',event)" title="'+(isFav?'移除最愛':'加入最愛')+'" style="cursor:pointer;color:'+(isFav?'#f59e0b':'#2d4156')+';font-size:15px;margin-left:-4px">'+(isFav?'★':'☆')+'</span>'
    +'<span style="color:var(--dim)">現價<span style="color:var(--text);margin-left:4px">'+fp(px)+'</span></span>'
    +'<span style="color:var(--dim)">RSI<span style="color:'+(r<30?'#22c55e':r>70?'#ef4444':'#5a7394')+';margin-left:4px">'+(r!=null?r.toFixed(1):'-')+'</span></span>'
    +'<span style="color:var(--dim)">MACD<span style="color:'+(ml>ms?'#22c55e':'#ef4444')+';margin-left:4px">'+(ml==null?'…':ml>ms?'多頭↑':'空頭↓')+'</span></span>'
    +'<span style="color:var(--dim)">MA200<span style="color:'+(m2?abv?'#22c55e':'#ef4444':'#2d4156')+';margin-left:4px">'+(m2?abv?'站上↑':'跌破↓':'N/A')+'</span></span>'
    +(S.updated?'<span style="color:#2d4156;margin-left:auto">'+S.updated+'</span>':'')

  else el.style.display='none';}

function renderLoad(){

function renderPanel(){

    {l:'MACD訊號',v:null,s:ml==null?'計算中':ml>ms?'黃金交叉↑':'死亡交叉↓',c:ml>ms?'#22c55e':'#ef4444'},
    {l:'MA200',v:m2?fp(m2):'資料不足',s:m2?abv?'站上(多)':'跌破(空)':'—',c:abv?'#22c55e':m2?'#ef4444':'#2d4156'},
    {l:'MA50',v:m5?fp(m5):'—',s:m5?px>m5?'站上':'跌破':'N/A',c:m5&&px>m5?'#22c55e':'#ef4444'},
    {l:'BB上軌',v:bbu?fp(bbu):'—',s:bbu?px>bbu?'已突破':'正常':'—',c:px>bbu?'#f59e0b':'#5a7394'},
    {l:'BB下軌',v:bbl?fp(bbl):'—',s:bbl?px<bbl?'已跌破':'正常':'—',c:px<bbl?'#ef4444':'#5a7394'},
    {l:'POC',v:S.poc?fp(S.poc):'—',s:S.poc?px>S.poc?'高於POC':'低於POC':'—',c:S.poc&&px>S.poc?'#22c55e':'#ef4444'},
  ];

      +'<span style="font-size:10px;color:var(--dim)">'+x.l+'</span>'
      +'<div style="text-align:right">'+(x.v?'<span style="font-size:9px;color:var(--mid);margin-right:4px">'+x.v+'</span>':'')+'<span style="font-size:10px;color:'+x.c+'">'+x.s+'</span></div>'
    +'</div>').join('');
  if(last){const bp=byP[last.pattern];
    html+='<div style="font-size:9px;color:#2d4156;letter-spacing:.05em;margin:13px 0 7px">▸ 最新形態信號</div>'
      +'<div style="background:#091525;border-radius:8px;border:1px solid #1a3a5f;padding:10px">'
        +'<div style="font-size:13px;font-weight:bold;margin-bottom:3px">'+last.pattern+'</div>'
        +'<div style="font-size:9px;color:var(--dim);margin-bottom:7px">'+last.date+' · 強度 '+last.str+'/'+last.maxStr+'</div>'
        +'<div style="background:var(--bd);border-radius:2px;height:4px;margin-bottom:9px">'
          +'<div style="width:'+(last.str/last.maxStr*100).toFixed(0)+'%;height:100%;border-radius:2px;background:'+(last.str/last.maxStr>0.7?'#22c55e':last.str/last.maxStr>0.5?'#f59e0b':'#ef4444')+'"></div>'
        +'</div>'
        +'<div style="margin-bottom:10px">'+last.conds.map(c=>'<div style="font-size:10px;color:#22c55e;padding:1.5px 0">✓ '+c+'</div>').join('')+'</div>'
        +'<div style="background:#0a1424;border-radius:6px;padding:9px">'
          +[['進場價格',fp(last.entry),'#60a5fa',''],['止盈目標 TP',fp(last.tp),'#22c55e','+'+last.tpPct+'%'],['止損位置 SL',fp(last.sl),'#ef4444','-'+last.slPct+'%']].map(([l,v,c,tag])=>

          +'<div style="border-top:1px solid var(--bd);margin-top:6px;padding-top:6px;display:flex;justify-content:space-between">'
            +'<span style="font-size:9px;color:var(--dim)">風報比 R:R</span>'
            +'<span style="font-size:12px;color:#f59e0b;font-weight:bold">1:'+(last.tpPct/last.slPct).toFixed(1)+'</span>'

        +'</div>'
        +(bp?'<div style="margin-top:8px;background:#0a1424;border-radius:6px;padding:8px;text-align:center">'
            +'<div style="font-size:9px;color:var(--dim);margin-bottom:2px">此形態歷史勝率</div>'
            +'<div style="font-size:24px;font-weight:bold;color:'+(bp.w/bp.t>0.5?'#22c55e':'#ef4444')+'">'+(bp.w/bp.t*100).toFixed(0)+'%</div>'
            +'<div style="font-size:9px;color:#2d4156">'+bp.w+'/'+bp.t+' 次達標</div>'
          +'</div>':'')
      +'</div>';}
  html+='<div style="margin:12px 0 6px;font-size:9px;color:#2d4156">▸ 歷史信號 ('+S.sigs.length+')</div>'
    +S.sigs.slice().reverse().slice(0,8).map(s=>{
      const bt=S.btR.find(r=>r.index===s.index);

      return'<div style="background:var(--bg);border-radius:4px;padding:5px 7px;margin-bottom:3px;border-left:3px solid '+col+'">'

  document.getElementById('panel-content').innerHTML=html;}

/* ══ FETCH & ACTIONS ════════════════════════════════════ */
async function fetchData(){
  S.loading=true;S.error=null;renderAll();
  try{
    const ex=EX[S.ex],sym=ex.sym(S.coin),n=S.ex==='binance'?1000:({'1D':300,'4H':300,'1H':300,'15M':300}[S.tf]);
    const data=await ex.get(sym,S.tf,n);
    if(!data||data.length<30)throw new Error('資料不足，請稍後重試');
    S.data=data;compute();S.updated=new Date().toLocaleTimeString();
  }catch(e){
    const msg=e.message||'載入失敗';
    S.error=(msg.includes('400')||msg.includes('HTTP 4'))?
      '找不到 '+EX[S.ex].sym(S.coin)+' ── 請確認是加密幣代號（如 BTC、PEPE），股票不適用':msg;
  }finally{S.loading=false;renderAll();}
}
function setEx(k){S.ex=k;fetchData();}
function setTF(t){S.tf=t;fetchData();}
function setTab(t){S.tab=t;renderCharts();}
function setRange(r){S.range=r;renderCharts();}
window.addEventListener('resize',()=>{clearTimeout(resizeT);resizeT=setTimeout(()=>renderAll(),200);});

// Init
renderHdr();renderCharts();renderPanel();
fetchData();
fetchTop100();
</script>
