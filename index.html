<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>K線分析系統</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080d14;--card:#0c1420;--bd:#162233;--dim:#3d5470;--mid:#5a7394;--text:#dde8f5;--g:#22c55e;--r:#ef4444;--bl:#60a5fa;--am:#f59e0b;--pu:#a78bfa;--or:#f97316}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:14px;display:flex;flex-direction:column;height:100vh;overflow:hidden}
button{cursor:pointer;font-family:'Courier New',monospace;font-size:12px;border-radius:3px;padding:2px 8px}
#hdr{background:var(--card);border-bottom:1px solid var(--bd);padding:6px 12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex-shrink:0}
.logo{color:var(--bl);font-weight:bold;font-size:15px;white-space:nowrap}
.bgrp{display:flex;gap:3px;flex-wrap:wrap}
#srch{background:#0a1628;border:1px solid var(--bd);border-radius:3px;color:var(--text);font-family:monospace;font-size:13px;padding:4px 9px;width:160px;outline:none}
#srch:focus{border-color:var(--bl)}
#stats{width:100%;display:flex;gap:12px;font-size:12px;padding:2px 0 0;border-top:1px solid var(--bd);margin-top:3px;flex-wrap:wrap;align-items:center}
#err{display:none;background:#2d0a0a;border:1px solid var(--r);border-radius:6px;margin:5px 8px;padding:7px 12px;justify-content:space-between;align-items:center;flex-shrink:0}
#loading{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.spin{font-size:28px;animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
#sidebar{width:190px;background:#090e1a;border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-tab{flex:1;padding:7px 2px;border:none;background:transparent;color:var(--mid);font-size:11px;cursor:pointer;border-bottom:2px solid transparent;font-family:monospace}
.sb-tab.on{color:var(--bl);border-bottom-color:var(--bl);background:rgba(96,165,250,0.06)}
#sb-filter{background:transparent;border:none;border-bottom:1px solid var(--bd);color:var(--text);font-size:12px;padding:6px 9px;width:100%;outline:none;font-family:monospace;flex-shrink:0}
#coin-list{flex:1;overflow-y:auto}
.ci{display:flex;align-items:center;padding:5px 6px;cursor:pointer;border-bottom:1px solid #0d1825;gap:3px}
.ci:hover{background:#111e30}
.ci.active{background:#142845;border-left:2px solid var(--bl)}
#main{display:flex;flex:1;overflow:hidden}
#charts{flex:1;overflow-y:auto;padding:7px 5px 7px 7px}
#panel{width:300px;background:var(--card);border-left:1px solid var(--bd);padding:10px;overflow-y:auto;flex-shrink:0}
.cbox{background:var(--card);border-radius:7px;margin-bottom:5px;padding:4px 6px}
.clbl{font-size:11px;color:var(--dim);margin-bottom:2px;display:flex;gap:10px;align-items:center}
.tab-btn{padding:4px 14px;border-radius:4px;border:none;background:var(--bd);color:var(--mid);font-size:12px}
.tab-btn.on{background:#1e40af;color:#fff}
.prow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bd)}
.tg{padding:2px 6px;border-radius:3px;cursor:pointer;font-family:monospace;font-size:10px;border:1px solid #0d1825;background:transparent;color:#1e2a3a}
.tg.on{background:rgba(96,165,250,0.1);color:#60a5fa;border-color:#1e40af}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>
<body>
<div id="hdr">
  <span class="logo">▣ K線分析</span>
  <div id="ex-btns" class="bgrp"></div>
  <input id="srch" placeholder="🔍 USDT對搜尋 (PEPE)" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter'){var v=this.value.trim().toUpperCase().replace(/[-\/]?USDT$/,'');if(v){S.coin=v;fetchData()}}">
  <div id="coin-btns" class="bgrp"></div>
  <div id="tf-btns" class="bgrp"></div>
  <button id="refresh" onclick="fetchData()" style="border:1px solid var(--bd);background:transparent;color:var(--text)">⟳ 刷新</button>
  <div id="stats"></div>
</div>
<div id="err"></div>
<div id="loading"><div class="spin">⟳</div><div id="load-msg" style="color:var(--mid)"></div></div>
<div id="main">
  <div id="sidebar">
    <div style="display:flex;border-bottom:1px solid var(--bd)">
      <button id="stAll" class="sb-tab on" onclick="sideTab='all';renderSB()">Top100</button>
      <button id="stFav" class="sb-tab" onclick="sideTab='fav';renderSB()">★ 最愛</button>
      <button id="stScan" class="sb-tab" onclick="sideTab='scan';renderSB()">🏆 推薦</button>
      <button onclick="sideTab==='scan'?scanWR():fetchTop100()" style="padding:6px 8px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:14px;border-left:1px solid var(--bd)">⟳</button>
    </div>
    <input id="sb-filter" placeholder="🔍 篩選..." oninput="renderSB()">
    <div id="coin-list"></div>
  </div>
  <div id="charts"><div id="cc"></div></div>
  <div id="panel"><div id="pc"></div></div>
</div>
<script>
/* ═══ CONFIG ═══ */
var CFG={atr_period:14,atr_sl_mult:1.5,atr_tp_mult:3.0,atr_trail_mult:2.0,rsi_period:14,rsi_slow_period:9,rsi_oversold:30,rsi_overbought:70,rsi_engulf_max:55,rsi_macd_lo:45,rsi_macd_hi:72,rsi_bb_lo:55,rsi_bb_hi:78,vol_lookback:10,vol_surge_mult:1.4,ema_periods:[100,200,300,500],ma200_proximity:0.015,bb_period:20,bb_mult:2,macd_fast:12,macd_slow:26,macd_signal:9,poc_lookback:60,poc_bins:50,hammer_shadow_ratio:2.5,hammer_wick_ratio:0.4,engulf_tolerance:1.003,tws_gap_pct:0.006,min_signal_score:4,entry_mode:'next_open',exit_mode:'trailing',max_hold_bars:120,fixed_hold_bars:30};
var COINS=['BTC','ETH','SOL','BNB','XRP','DOGE','ADA','AVAX','DOT','LINK','LTC','MATIC'];
var TFS=['3M','1M','1W','1D','4H','1H','15M'];
var STABLES=new Set(['USDT','USDC','BUSD','DAI','TUSD','FDUSD']);
var FALLBACK=[[1,'BTC'],[2,'ETH'],[3,'BNB'],[4,'SOL'],[5,'XRP'],[6,'DOGE'],[7,'ADA'],[8,'AVAX'],[9,'SHIB'],[10,'DOT'],[11,'LINK'],[12,'MATIC'],[13,'LTC'],[14,'UNI'],[15,'ATOM'],[16,'XLM'],[17,'APT'],[18,'OP'],[19,'ARB'],[20,'NEAR'],[21,'FIL'],[22,'SUI'],[23,'INJ'],[24,'TIA'],[25,'PEPE'],[26,'BONK'],[27,'WIF'],[28,'FLOKI'],[29,'ORDI'],[30,'AAVE'],[31,'GRT'],[32,'SAND'],[33,'MANA'],[34,'CRV'],[35,'MKR'],[36,'COMP'],[37,'GMX'],[38,'DYDX'],[39,'IMX'],[40,'RNDR'],[41,'FET'],[42,'WLD'],[43,'JUP'],[44,'PYTH'],[45,'PENDLE'],[46,'SEI'],[47,'HBAR'],[48,'VET'],[49,'RUNE'],[50,'THETA']].map(function(x){return{rank:x[0],symbol:x[1],name:x[1],price:0,change24h:0}});
/* ═══ EXCHANGES ═══ */
var EX={
  binance:{label:'Binance',color:'#F0B90B',sym:function(c){return c+'USDT'},
    get:function(sym,tf,n){var iv={'3M':'3M','1M':'1M','1W':'1w','1D':'1d','4H':'4h','1H':'1h','15M':'15m'}[tf];
      return fetch('https://api.binance.com/api/v3/klines?symbol='+sym+'&interval='+iv+'&limit='+n).then(function(r){if(!r.ok)throw new Error('Binance HTTP '+r.status);return r.json()}).then(function(d){if(!Array.isArray(d))throw new Error('Bad data');return d.map(function(k,i){return{i:i,date:fd(+k[0]),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}})})}},
  bybit:{label:'Bybit',color:'#F7A600',sym:function(c){return c+'USDT'},
    get:function(sym,tf,n){var iv={'3M':'M','1M':'M','1W':'W','1D':'D','4H':'240','1H':'60','15M':'15'}[tf];
      return fetch('https://api.bybit.com/v5/market/kline?category=linear&symbol='+sym+'&interval='+iv+'&limit='+n).then(function(r){if(!r.ok)throw new Error('Bybit HTTP '+r.status);return r.json()}).then(function(d){if(d.retCode!==0)throw new Error('Bybit: '+d.retMsg);return d.result.list.slice().reverse().map(function(k,i){return{i:i,date:fd(+k[0]),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}})})}},
  okx:{label:'OKX',color:'#00C2FF',sym:function(c){return c+'-USDT'},
    get:function(sym,tf,n){var iv={'3M':'3M','1M':'1M','1W':'1W','1D':'1D','4H':'4H','1H':'1H','15M':'15m'}[tf];
      return fetch('https://www.okx.com/api/v5/market/candles?instId='+sym+'&bar='+iv+'&limit='+n).then(function(r){if(!r.ok)throw new Error('OKX HTTP '+r.status);return r.json()}).then(function(d){if(d.code!=='0')throw new Error('OKX: '+d.msg);return d.data.slice().reverse().map(function(k,i){return{i:i,date:fd(+k[0]),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]}})})}},
};
/* ═══ STATE ═══ */
var S={ex:'binance',coin:'BTC',tf:'1D',range:'recent',data:[],loading:false,error:null,tab:'chart',updated:null,cl:[],vl:[],macd:{line:[],sig:[],hist:[]},rsi:[],rsiSlow:[],atrA:[],ma200:[],ma50:[],emas:{},bb:{up:[],mid:[],lo:[]},poc:null,sigs:[],btR:[],riskA:[],entryMarkers:[],exitMarkers:[]};
var IND={ema100:true,ema200:true,ema300:false,ema500:false,bb:true,poc:true,vol:true,macd:true,rsi:true,risk:true,signals:true};
var sideTab='all',top100=[],sbLoading=true,scanResults={},scanRunning=false,lastScanTime=null;
var favs=JSON.parse(localStorage.getItem('kl_favs')||'[]');
var chartW=640,chartH=300,zoomLevel=1.0,panOffset=0;
/* ═══ UTILS ═══ */
function fd(ts){var d=new Date(ts);return ('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2)}
function fp(v){if(v==null)return'-';var a=Math.abs(v);if(a>=1e5)return(v/1e3).toFixed(0)+'K';if(a>=1e4)return v.toFixed(0);if(a>=100)return v.toFixed(2);return v.toFixed(4)}
function fpS(v){if(!v)return'-';var a=Math.abs(v);if(a>=1e4)return(v/1e3).toFixed(0)+'K';if(a>=100)return v.toFixed(0);if(a>=1)return v.toFixed(2);if(a>=1e-4)return v.toFixed(4);return v.toExponential(2)}
/* ═══ MATH ═══ */
function _ema(arr,p){var k=2/(p+1),res=[],e=null;for(var i=0;i<arr.length;i++){if(arr[i]==null){res.push(null);continue}if(e===null){if(i<p-1){res.push(null);continue}e=arr.slice(i-p+1,i+1).reduce(function(a,b){return a+b})/p}else e=arr[i]*k+e*(1-k);res.push(+e.toFixed(8))}return res}
function _sma(arr,p){return arr.map(function(_,i){return i<p-1?null:+(arr.slice(i-p+1,i+1).reduce(function(a,b){return a+b})/p).toFixed(6)})}
function _macd(cl){var l12=_ema(cl,CFG.macd_fast),l26=_ema(cl,CFG.macd_slow);var line=l12.map(function(v,i){return v!=null&&l26[i]!=null?+(v-l26[i]).toFixed(8):null});var sig=_ema(line.map(function(v){return v!=null?v:0}),CFG.macd_signal);return{line:line,sig:sig,hist:line.map(function(v,i){return v!=null&&sig[i]!=null?+(v-sig[i]).toFixed(8):null})}}
function _rsi(cl,p){p=p||CFG.rsi_period;return cl.map(function(_,i){if(i<p)return null;var g=0,l=0;for(var j=i-p+1;j<=i;j++){var d=cl[j]-cl[j-1];d>0?g+=d:l-=d}var ag=g/p,al=l/p;return al===0?100:+(100-100/(1+ag/al)).toFixed(2)})}
function _rsiSlow(r){return _sma(r.map(function(v){return v!=null?v:50}),CFG.rsi_slow_period)}
function _atr(D,p){p=p||CFG.atr_period;var tr=D.map(function(c,i){if(i===0)return c.high-c.low;var prev=D[i-1].close;return Math.max(c.high-c.low,Math.abs(c.high-prev),Math.abs(c.low-prev))});var res=[];for(var i=0;i<tr.length;i++){if(i<p-1){res.push(null);continue}if(i===p-1){res.push(tr.slice(0,p).reduce(function(a,b){return a+b})/p);continue}res.push(+(res[i-1]*(p-1)/p+tr[i]/p).toFixed(8))}return res}
function _bb(cl,p,m){p=p||CFG.bb_period;m=m||CFG.bb_mult;var mid=_sma(cl,p),up=[],lo=[];cl.forEach(function(_,i){if(i<p-1){up.push(null);lo.push(null);return}var sl=cl.slice(i-p+1,i+1),mn=mid[i];var sd=Math.sqrt(sl.reduce(function(s,v){return s+(v-mn)*(v-mn)},0)/p);up.push(+(mn+m*sd).toFixed(6));lo.push(+(mn-m*sd).toFixed(6))});return{up:up,mid:mid,lo:lo}}
function _poc(D,look){look=look||CFG.poc_lookback;var rc=D.slice(-look);var all=[];rc.forEach(function(c){all.push(c.high,c.low)});var mn=Math.min.apply(null,all),mx=Math.max.apply(null,all);var step=(mx-mn)/CFG.poc_bins||0.01,map={};rc.forEach(function(c){var lv=Math.max(1,Math.round((c.high-c.low)/step));for(var l=0;l<=lv;l++){var p=+(c.low+l*step).toFixed(6);map[p]=(map[p]||0)+c.volume/(lv+1)}});var mv=0,poc=mn;Object.keys(map).forEach(function(p){if(map[p]>mv){mv=map[p];poc=+p}});return poc}
/* ═══ SIGNALS ═══ */
function detectSignals(){var D=S.data,rsiA=S.rsi,rsiSlowA=S.rsiSlow,macdO=S.macd,ma200A=S.ma200,bbO=S.bb,volA=S.vl,atrArr=S.atrA;var out=[];
for(var i=Math.max(15,CFG.atr_period);i<D.length-1;i++){var c=D[i],p=D[i-1],body=Math.abs(c.close-c.open),bull=c.close>=c.open;var lw=Math.min(c.open,c.close)-c.low,uw=c.high-Math.max(c.open,c.close);
var avV=0;for(var vi=Math.max(0,i-CFG.vol_lookback);vi<i;vi++)avV+=volA[vi];avV=avV/CFG.vol_lookback||1;var vs=c.volume>avV*CFG.vol_surge_mult;
var a200=ma200A[i]!=null&&c.close>ma200A[i],n200=ma200A[i]!=null&&Math.abs(c.low-ma200A[i])/ma200A[i]<CFG.ma200_proximity;
var r=rsiA[i],r1=rsiA[i-1],rSl=rsiSlowA[i],rAbv=r!=null&&rSl!=null&&r>rSl;
var ml=macdO.line[i],ms=macdO.sig[i],mh=macdO.hist[i],mhp=macdO.hist[i-1];
var atr=atrArr[i];var hit=null;
if(bull&&lw>CFG.hammer_shadow_ratio*body&&uw<CFG.hammer_wick_ratio*body){var s=2,co=['下影線>='+CFG.hammer_shadow_ratio+'倍實體','看漲收盤'];if(r!=null&&r<CFG.rsi_oversold+5){if(rAbv){co.push('RSI超賣回升 快>慢✓');s+=2}else{co.push('RSI超賣');s+=1}}if(bbO.lo[i]!=null&&c.low<=bbO.lo[i]){co.push('觸及布林下軌');s++}if(a200||n200){co.push('MA200支撐');s++}if(vs){co.push('量能放大');s++}if(s>=CFG.min_signal_score)hit={n:'🔨 強力錘子線',co:co,s:s,ms:7}}
if(!hit&&bull&&p.close<p.open&&c.open<=p.close*CFG.engulf_tolerance&&c.close>=p.open){var s=2,co=['看漲吞噬型態'];if(r!=null&&r<CFG.rsi_engulf_max){if(rAbv){co.push('RSI快>慢✓');s+=2}else s+=1}if(mh!=null&&mhp!=null&&mh>0&&mhp<0){co.push('MACD柱轉正');s+=2}if(a200){co.push('MA200多方');s++}if(vs){co.push('量能確認');s++}if(s>=CFG.min_signal_score)hit={n:'🟢 看漲吞噬',co:co,s:s,ms:7}}
if(!hit&&ml!=null&&ms!=null&&macdO.line[i-1]!=null&&macdO.sig[i-1]!=null&&ml>ms&&macdO.line[i-1]<=macdO.sig[i-1]){var s=2,co=['MACD黃金交叉'];if(r!=null&&r>CFG.rsi_macd_lo&&r<CFG.rsi_macd_hi){if(rAbv){co.push('RSI動能 快>慢✓');s+=2}else s+=1}if(a200){co.push('MA200多頭');s+=2}if(vs){co.push('量能確認');s++}if(mh!=null&&mhp!=null&&mh>mhp){co.push('MACD柱擴張');s++}if(s>=CFG.min_signal_score)hit={n:'📈 MACD黃金交叉',co:co,s:s,ms:8}}
if(!hit&&bbO.up[i]!=null&&bbO.up[i-1]!=null&&c.close>bbO.up[i]&&p.close<=bbO.up[i-1]){var s=2,co=['突破布林上軌'];if(vs){co.push('量能放大確認');s+=2}if(r!=null&&r>CFG.rsi_bb_lo&&r<CFG.rsi_bb_hi){if(rAbv){co.push('RSI強勢 快>慢✓');s+=2}else s+=1}if(a200){co.push('MA200多頭');s++}if(mh!=null&&mh>0){co.push('MACD正區');s++}if(s>=CFG.min_signal_score)hit={n:'🚀 布林突破',co:co,s:s,ms:8}}
if(!hit&&r1!=null&&r!=null&&r1<CFG.rsi_oversold&&r>CFG.rsi_oversold+2&&bull){var s=2,co=['RSI超賣回升'];if(rAbv){co.push('RSI快線上穿慢線✓');s+=2}if(n200){co.push('MA200支撐');s+=2}if(bbO.lo[i-1]!=null&&p.low<=bbO.lo[i-1]){co.push('布林下軌彈升');s++}if(vs){co.push('量能放大');s++}if(s>=CFG.min_signal_score)hit={n:'🔄 RSI反彈',co:co,s:s,ms:7}}
if(!hit&&i>=2){var c0=D[i],c1=D[i-1],c2=D[i-2];if(c0.close>c0.open&&c1.close>c1.open&&c2.close>c2.open&&c0.close>c1.close&&c1.close>c2.close&&Math.abs(c0.open-c1.close)/c1.close<CFG.tws_gap_pct){var s=3,co=['三白兵型態'];if(vs){co.push('量能放大');s++}if(a200){co.push('MA200多方');s++}if(r!=null&&r<CFG.rsi_overbought){if(rAbv){co.push('RSI未超買 快>慢✓');s+=2}else s+=1}if(s>=CFG.min_signal_score)hit={n:'🏛️ 三白兵',co:co,s:s,ms:7}}}
if(hit&&atr!=null&&atr>0){var ep=(CFG.entry_mode==='next_open'&&i+1<D.length)?D[i+1].open:c.close;var tp=+(ep+CFG.atr_tp_mult*atr).toFixed(6),sl=+(ep-CFG.atr_sl_mult*atr).toFixed(6);out.push({index:i,date:c.date,close:c.close,pattern:hit.n,conds:hit.co,str:hit.s,maxStr:hit.ms,entry:+ep.toFixed(6),tp:tp,sl:sl,tpPct:+((tp-ep)/ep*100).toFixed(2),slPct:+((ep-sl)/ep*100).toFixed(2),atr:+atr.toFixed(6),entryMode:CFG.entry_mode==='next_open'?'下根開盤':'當根收盤'})}}
var ded=[];out.forEach(function(s){if(!ded.length||s.index-ded[ded.length-1].index>5)ded.push(s);else if(s.str>ded[ded.length-1].str)ded[ded.length-1]=s});S.sigs=ded}
/* ═══ BACKTEST ═══ */
function doBacktest(){S.btR=S.sigs.map(function(s){var D=S.data,entryBar=CFG.entry_mode==='next_open'?s.index+1:s.index;if(entryBar>=D.length)return null;var ep=s.entry,curSL=s.sl,hw=ep,maxB=CFG.exit_mode==='trailing'?CFG.max_hold_bars:CFG.fixed_hold_bars;

function fetchTop100(){sbLoading=true;renderSB();fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false&price_change_percentage=24h').then(function(r){if(!r.ok)throw new Error('rate limit');return r.json()}).then(function(d){top100=d.filter(function(c){return!STABLES.has(c.symbol.toUpperCase())}).map(function(c,i){return{rank:c.market_cap_rank||i+1,symbol:c.symbol.toUpperCase(),name:c.name,price:c.current_price||0,change24h:c.price_change_percentage_24h||0}})}).catch(function(){top100=FALLBACK}).finally(function(){sbLoading=false;renderSB()})}
function fetchData(){S.loading=true;S.error=null;renderAll();var ex=EX[S.ex],sym=ex.sym(S.coin),n=S.ex==='binance'?1000:300;ex.get(sym,S.tf,n).then(function(data){if(!data||data.length<30)throw new Error('資料不足');S.data=data;compute();S.updated=new Date().toLocaleTimeString()}).catch(function(e){var msg=e.message||'載入失敗';S.error=(msg.indexOf('400')>=0||msg.indexOf('HTTP 4')>=0)?'找不到 '+EX[S.ex].sym(S.coin)+' — 僅支援加密貨幣USDT對':msg}).finally(function(){S.loading=false;renderAll()})}
function applyCfg(){['atr_period','atr_sl_mult','atr_tp_mult','atr_trail_mult','rsi_period','rsi_slow_period','rsi_oversold','rsi_overbought','vol_lookback','vol_surge_mult','ma200_proximity','min_signal_score','max_hold_bars'].forEach(function(k){var el=document.getElementById('cfg_'+k);if(el){var v=parseFloat(el.value);if(!isNaN(v))CFG[k]=v}});compute();renderAll()}
function resetCfg(){Object.assign(CFG,{atr_period:14,atr_sl_mult:1.5,atr_tp_mult:3.0,atr_trail_mult:2.0,rsi_period:14,rsi_slow_period:9,rsi_oversold:30,rsi_overbought:70,rsi_engulf_max:55,rsi_macd_lo:45,rsi_macd_hi:72,rsi_bb_lo:55,rsi_bb_hi:78,vol_lookback:10,vol_surge_mult:1.4,ema_periods:[100,200,300,500],ma200_proximity:0.015,bb_period:20,bb_mult:2,min_signal_score:4,max_hold_bars:120});compute();renderAll()}
/* ═══ SCAN ═══ */
function scanWR(){if(scanRunning)return;scanRunning=true;scanResults={};renderSB();var coins=top100.map(function(c){return c.symbol}).slice(0,100),ci=0;
function next(){if(ci>=coins.length){scanRunning=false;lastScanTime=new Date().toLocaleTimeString();renderSB();return}
var sym=coins[ci++];EX[S.ex].get(EX[S.ex].sym(sym),'1D',300).then(function(data){if(!data||data.length<50)return;
var cl=data.map(function(d){return d.close}),vl=data.map(function(d){return d.volume});
var old={data:S.data,cl:S.cl,vl:S.vl,macd:S.macd,rsi:S.rsi,rsiSlow:S.rsiSlow,ma200:S.ma200,bb:S.bb,atrA:S.atrA,emas:S.emas,ma50:S.ma50,poc:S.poc,riskA:S.riskA,sigs:S.sigs,btR:S.btR,entryMarkers:S.entryMarkers,exitMarkers:S.exitMarkers};
S.data=data;S.cl=cl;S.vl=vl;S.macd=_macd(cl);S.rsi=_rsi(cl);S.rsiSlow=_rsiSlow(S.rsi);S.atrA=_atr(data);S.emas={};CFG.ema_periods.forEach(function(p){S.emas[p]=cl.length>=p?_ema(cl,p):cl.map(function(){return null})});S.ma200=S.emas[200]||cl.map(function(){return null});S.ma50=S.emas[100]||cl.map(function(){return null});S.bb=cl.length>=20?_bb(cl):{up:[],mid:[],lo:[]};S.poc=data.length>=60?_poc(data):null;
detectSignals();doBacktest();
var sigs=S.sigs.length,wins=S.btR.filter(function(r){return r.result==='WIN'}).length;
if(sigs>=2)scanResults[sym]={sigs:sigs,wins:wins,wr:+(wins/sigs*100).toFixed(1)};
Object.assign(S,old)}).catch(function(){}).finally(function(){if(ci%5===0)renderSB();setTimeout(next,350)})};next()}
/* ═══ RENDER ALL ═══ */
function renderAll(){renderHdr();renderCharts();renderPanel();renderSB()}
/* ═══ EVENTS ═══ */
var resizeT;window.addEventListener('resize',function(){clearTimeout(resizeT);resizeT=setTimeout(renderAll,200)});
window.addEventListener('wheel',function(e){var w=document.getElementById('candle-wrap');if(!w||!w.contains(e.target))return;e.preventDefault();zoomLevel=Math.max(0.3,Math.min(5,zoomLevel+(e.deltaY>0?-0.15:0.15)));chartH=Math.max(200,Math.min(800,Math.round(300*zoomLevel)));renderCharts()},{passive:false});
var isDrag=false,dragX=0,dragOff=0;
document.addEventListener('mousedown',function(e){var w=document.getElementById('candle-wrap');if(w&&w.contains(e.target)){isDrag=true;dragX=e.clientX;dragOff=panOffset;w.style.cursor='grabbing'}});
document.addEventListener('mousemove',function(e){if(!isDrag)return;panOffset=dragOff+Math.round((e.clientX-dragX)/3);renderCharts()});
document.addEventListener('mouseup',function(){if(isDrag){isDrag=false;var w=document.getElementById('candle-wrap');if(w)w.style.cursor='grab'}});
/* ═══ INIT ═══ */
renderAll();fetchData();fetchTop100();
setInterval(function(){if(top100.length>0)scanWR()},3600000);
</script>
</body>
</html>
